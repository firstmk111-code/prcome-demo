<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 보도자료 작성 (가안) — PRCOME PR 도구</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;700&display=swap">
<link rel="stylesheet" href="../assets/css/style.css">
<link rel="stylesheet" href="../assets/css/magazine-system.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230E1726'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%23FF5A1F'/%3E%3C/svg%3E">
<script>window.SITE_ROOT='../';window.MAG={root:'../',home:'../index.html',catBase:'../insights/index.html'};</script>
</head>
<body>
<div id="mag-header"></div>

<header class="page-hero">
  <div class="wrap">
    <div class="crumb"><a href="../index.html">홈</a> › <a href="index.html">PR 도구</a> › AI 보도자료 작성</div>
    <h1>AI 보도자료 작성 <span style="font-size:16px;font-weight:600;color:var(--coral)">가안</span></h1>
    <p class="lead">핵심 정보를 입력하면 보도자료 형식에 맞춘 초안을 구성해 드립니다. 생성된 초안은 검토·수정 후 사용하세요.</p>
  </div>
</header>

<div class="wrap" style="padding-top:26px">
  <div class="notice" style="margin-bottom:20px">1차 데모 가안입니다. 실제 생성형 AI 연결은 준비 중이며, 아래 미리보기는 입력값을 <b>보도자료 표준 양식(육하원칙·리드·인용문)</b>에 맞춰 구성하는 템플릿 기반 결과입니다.</div>

  <div class="split" style="gap:30px;grid-template-columns:1fr 1fr">
    <!-- 입력 -->
    <div class="form-card">
      <h3 style="font-size:17px;color:var(--ink);margin-bottom:16px">보도자료 정보 입력</h3>
      <div class="form-row"><label>회사·기관명 <span class="req">*</span></label><input class="input" id="f-org" value="그린테이블"></div>
      <div class="form-row"><label>발표 핵심 (무엇을) <span class="req">*</span></label><input class="input" id="f-what" value="비건 간편식 신규 라인 ‘그린테이블 데일리’ 출시"></div>
      <div class="grid g-2" style="gap:14px">
        <div class="form-row"><label>시점 (언제)</label><input class="input" id="f-when" value="2026년 8월 1일"></div>
        <div class="form-row"><label>장소·범위 (어디서)</label><input class="input" id="f-where" value="전국 주요 온라인몰"></div>
      </div>
      <div class="form-row"><label>주요 특징 (한 줄씩)</label>
        <textarea class="textarea" id="f-points" style="min-height:110px">100% 식물성 원료, 동물성 원료 무첨가
1인 가구 겨냥한 한 끼 완결형 구성
합성보존료 대신 저온 살균 공정 적용</textarea></div>
      <div class="form-row"><label>인용문 화자 (직책·이름)</label><input class="input" id="f-who" value="그린테이블 김서연 대표"></div>
      <div class="form-row"><label>인용문 내용</label>
        <textarea class="textarea" id="f-quote" style="min-height:70px">바쁜 일상 속에서도 건강한 한 끼를 포기하지 않도록, 맛과 영양의 균형을 최우선으로 개발했다</textarea></div>
      <div class="form-row"><label>문의처</label><input class="input" id="f-contact" value="그린테이블 홍보팀 · pr@greentable.example · 02-000-0000"></div>
      <button class="btn btn-signal" style="width:100%" onclick="gen()">보도자료 초안 생성</button>
    </div>

    <!-- 미리보기 -->
    <div>
      <div class="card" style="position:sticky;top:88px">
        <div style="background:var(--ink);color:#fff;padding:14px 20px;display:flex;justify-content:space-between;align-items:center">
          <b style="font-size:14px">📄 보도자료 초안 미리보기</b>
          <button class="btn btn-sm" style="background:var(--signal);color:#fff" onclick="copyPR()">복사</button>
        </div>
        <div class="prose" id="pr-out" style="padding:26px;font-size:15px;line-height:1.8;max-height:560px;overflow:auto"></div>
      </div>
      <p class="muted mt-16" style="font-size:12.5px">※ 생성 결과는 초안입니다. 사실관계·수치·표현을 반드시 검토하고, 과장·미검증 표현은 수정 후 배포하세요.</p>
    </div>
  </div>
  <div style="height:60px"></div>
</div>

<div id="mag-footer"></div>
<script src="../assets/js/magazine-header.js"></script>
<script>
function v(id){return (document.getElementById(id).value||'').trim();}
function gen(){
  var org=v('f-org'),what=v('f-what'),when=v('f-when'),where=v('f-where');
  var pts=v('f-points').split('\n').filter(Boolean);
  var who=v('f-who'),quote=v('f-quote'),contact=v('f-contact');
  var title=org+', '+what;
  var lead=org+'가(이) '+(when||'최근')+' '+(where?where+'에서 ':'')+what.replace(/ 출시$/,'')+'을(를) 선보인다고 밝혔다.';
  var body='이번 발표의 주요 내용은 다음과 같다. '+ (pts.length?pts.map(function(p){return p;}).join(' 또한, '):'세부 내용은 추후 안내될 예정이다.')+'.';
  var q=quote?('<blockquote>“'+quote+'”</blockquote><p>'+(who||org+' 관계자')+'는 이같이 말했다.</p>'):'';
  var html='<p style="color:var(--text-3);font-size:12.5px">보도자료 · '+(when||'')+' 배포용</p>'+
    '<h2 style="font-family:var(--serif);font-size:21px;margin:6px 0 4px;color:var(--ink)">'+title+'</h2>'+
    '<p style="color:var(--signal);font-weight:700;font-size:14px;margin-bottom:16px">— '+(pts[0]||'주요 특징 요약')+'</p>'+
    '<p><b>['+(where||'서울')+'='+'PRCOME] </b>'+lead+'</p>'+
    '<p>'+body+'</p>'+ q +
    '<p>자세한 내용은 아래 문의처를 통해 확인할 수 있다.</p>'+
    '<p style="border-top:1px solid var(--line);padding-top:12px;color:var(--text-2);font-size:13.5px">▶ 문의: '+(contact||'-')+'</p>';
  document.getElementById('pr-out').innerHTML=html;
}
function copyPR(){
  var t=document.getElementById('pr-out').innerText;
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){alert('초안을 클립보드에 복사했습니다.');});}
  else alert('복사를 지원하지 않는 환경입니다.');
}
gen();
</script>
</body>
</html>
