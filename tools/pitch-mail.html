<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>피치 메일 작성 — PRCOME PR 도구</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../assets/css/magazine-system.css">
<script>window.MAG={root:'../',home:'../index.html',catBase:'../insights/index.html'};</script>
<style>
.subhead{padding:30px 0 6px}.subhead .crumb{font-size:12.5px;color:var(--sub);margin-bottom:12px}
.subhead h1{font-size:clamp(24px,3vw,32px);font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:12px}
.subhead h1 .tick{width:26px;height:3px;background:var(--pt);border-radius:2px}
.subhead .desc{font-size:15.5px;color:var(--sub);margin-top:10px;max-width:56ch;line-height:1.6}
.pm{display:grid;grid-template-columns:1fr 1fr;gap:30px;padding:26px 0;align-items:start}
.pm label{display:block;font-size:13px;font-weight:700;margin:0 0 6px}
.pm input,.pm textarea{width:100%;border:1px solid var(--line-2);border-radius:4px;padding:11px 13px;font-family:inherit;font-size:14.5px}
.pm input{height:48px}.pm textarea{min-height:90px;resize:vertical}
.pm .fr{margin-bottom:14px}
.pm .go{height:44px;border:0;border-radius:4px;background:var(--pt);color:#fff;font-weight:700;font-size:15px;padding:0 22px;width:100%}
.out{border:1px solid var(--line);border-radius:8px;overflow:hidden;position:sticky;top:130px}
.out .h{background:var(--ink);color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:700}
.out .h button{background:var(--pt);color:#fff;border:0;border-radius:4px;padding:6px 12px;font-weight:700;font-size:12.5px}
.out .body{padding:20px;font-size:14px;line-height:1.8;white-space:pre-wrap}
@media (max-width:900px){.pm{grid-template-columns:1fr}.out{position:static}}
</style>
</head>
<body>
<div id="mag-header"></div>
<div class="wrap">
  <section class="subhead">
    <div class="crumb"><a href="../index.html">홈</a> / <a href="index.html">PR 도구</a> / 피치 메일 작성</div>
    <h1><span class="tick"></span>기자 피치 메일 작성</h1>
    <p class="desc">기자에게 보내는 짧고 예의 있는 피치 메일 초안을 구성합니다. 실제 발송은 하지 않습니다. (가안)</p>
  </section>
  <div class="pm">
    <div>
      <div class="fr"><label>담당 기자/매체</label><input id="to" value="경제산업신문 산업부"></div>
      <div class="fr"><label>보내는 사람</label><input id="from" value="그린테이블 홍보팀 김서연"></div>
      <div class="fr"><label>핵심 소식</label><input id="topic" value="비건 간편식 신규 라인 ‘데일리’ 출시"></div>
      <div class="fr"><label>왜 지금·왜 이 기자인가 (앵글)</label><textarea id="angle">1인 가구 식품 트렌드와 맞닿아 있어, 산업부에서 다뤄주시면 좋겠습니다.</textarea></div>
      <button class="go" onclick="gen()">피치 메일 생성</button>
    </div>
    <div class="out"><div class="h"><span>피치 메일 초안</span><button onclick="cp()">복사</button></div><div class="body" id="out"></div></div>
  </div>
  <div style="height:50px"></div>
</div>
<div id="mag-footer"></div>
<script src="../assets/js/magazine-header.js"></script>
<script>
function v(id){return (document.getElementById(id).value||'').trim();}
function gen(){
 var to=v('to'),from=v('from'),topic=v('topic'),angle=v('angle');
 var mail='제목: ['+topic.replace(/ 출시$/,'')+'] 보도자료 전달드립니다\n\n'+to+' 기자님, 안녕하세요.\n'+from+'입니다.\n\n'+
 topic+' 소식을 전해드리고자 메일 드립니다. '+angle+'\n\n'+
 '요청 주시면 제품 사진과 대표 인터뷰를 바로 보내드리겠습니다. 짧게라도 검토해 주시면 감사하겠습니다.\n\n감사합니다.\n'+from+' 드림';
 document.getElementById('out').textContent=mail;
}
function cp(){var t=document.getElementById('out').innerText;if(navigator.clipboard){navigator.clipboard.writeText(t).then(function(){alert('초안을 복사했습니다.');});}else alert('복사를 지원하지 않는 환경입니다.');}
gen();
</script>
</body>
</html>
