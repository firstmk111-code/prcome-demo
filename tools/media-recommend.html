};
function rec(){var ind=document.getElementById('ind').value,l=DB[ind]||DB['식품·소비재'];
 document.getElementById('grid').innerHTML=l.map(function(m,i){return '<a class="card card-pad" href="../directory/detail.html"><div class="flex between items-center"><div class="logo-badge">'+m[0][0]+'</div><span class="chip '+(i===0?'signal':'line')+'">'+(i===0?'추천 1순위':'추천')+'</span></div><h3 style="font-size:16px;margin:12px 0 4px;color:var(--text-primary)">'+m[0]+'</h3><div class="muted" style="font-size:12.5px">'+m[1]+' · '+m[3]+'</div><div class="tag-row mt-16"><span class="chip line">'+m[2]+'</span></div></a>';}).join('');}
rec();
</script>
