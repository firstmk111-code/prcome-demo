<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>해시태그 생성기 — PRCOME 마케팅 도구</title>
<meta name="description" content="주제 키워드와 카테고리를 입력하면 인스타그램·블로그용 추천 해시태그를 생성합니다. 클릭 한 번으로 복사.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../assets/css/magazine-system.css">
<script>window.MAG={root:'../',home:'../index.html',catBase:'../insights/index.html'};</script>
<style>
.tw{max-width:820px}
.subhead{padding:30px 0 6px}
.subhead .crumb{font-size:12.5px;color:var(--sub);margin-bottom:12px}
.subhead h1{font-size:clamp(22px,2.7vw,30px);font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:12px}
.subhead h1 .tick{width:26px;height:3px;background:var(--pt);border-radius:2px}
.subhead .desc{font-size:15px;color:var(--sub);margin-top:10px;line-height:1.6}
.panel{background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:24px;margin-top:22px}
.frow{display:grid;grid-template-columns:1.4fr 1fr;gap:14px}
.f label{display:block;font-size:13px;font-weight:700;margin-bottom:7px}
.f input,.f select{width:100%;height:48px;border:1px solid var(--line-2);border-radius:6px;padding:0 13px;font-family:inherit;font-size:15px;outline:0;background:var(--surf)}
.f input:focus,.f select:focus{border-color:var(--pt);box-shadow:0 0 0 3px var(--pt-soft)}
.calc{margin-top:16px;width:100%;height:52px;background:var(--pt);color:#fff;border:0;border-radius:8px;font-family:inherit;font-size:16px;font-weight:800;cursor:pointer}
.calc:hover{background:var(--pt-2)}
.result{margin-top:20px;display:none}.result.on{display:block}
.rhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.rhead h3{font-size:14px;font-weight:800}
.rhead button{font-family:inherit;font-size:12.5px;font-weight:700;color:var(--pt);background:var(--pt-soft);border:0;border-radius:6px;padding:8px 14px;cursor:pointer}
.tags{display:flex;flex-wrap:wrap;gap:8px}
.tags span{font-size:13.5px;font-weight:600;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:7px 12px;cursor:pointer;transition:.15s}
.tags span:hover{border-color:var(--pt);color:var(--pt)}
.tags span.sel{background:var(--pt);color:#fff;border-color:var(--pt)}
.copybox{margin-top:16px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:14px;font-size:13.5px;color:var(--sub);line-height:1.7;min-height:52px;word-break:break-all}
.note{font-size:12.5px;color:var(--sub-2);margin-top:16px;line-height:1.6}
@media (max-width:600px){.frow{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="mag-header"></div>
<div class="wrap tw">
  <section class="subhead">
    <div class="crumb"><a href="../index.html">홈</a> / <a href="index.html">마케팅 도구</a> / 해시태그 생성기</div>
    <h1><span class="tick"></span>해시태그 생성기</h1>
    <p class="desc">핵심 키워드와 카테고리를 입력하면 인스타그램·블로그용 추천 해시태그를 생성합니다. 태그를 눌러 선택하고 한 번에 복사하세요.</p>
  </section>

  <div class="panel">
    <div class="frow">
      <div class="f"><label>핵심 키워드</label><input id="kw" placeholder="예: 비건 간편식"></div>
      <div class="f"><label>카테고리</label>
        <select id="cat">
          <option value="food">푸드·외식</option>
          <option value="beauty">뷰티·화장품</option>
          <option value="fashion">패션·라이프</option>
          <option value="tech">IT·테크</option>
          <option value="travel">여행·숙박</option>
          <option value="promo">홍보·이벤트</option>
        </select></div>
    </div>
    <button class="calc" onclick="gen()">해시태그 생성</button>

    <div class="result" id="res">
      <div class="rhead"><h3>추천 해시태그 <span id="cnt" style="color:var(--sub-2);font-weight:600"></span></h3><button onclick="copyAll()">전체 복사</button></div>
      <div class="tags" id="tags"></div>
      <div class="copybox" id="copybox">태그를 눌러 선택하면 여기에 모입니다.</div>
    </div>
  </div>
  <p class="note">※ 생성 결과는 키워드·카테고리 조합 기반의 추천 예시입니다. 인스타그램은 게시물당 3~5개의 핵심 태그 + 5~10개의 롱테일 태그 조합을 권장합니다.</p>
  <div style="height:60px"></div>
</div>
<div id="mag-footer"></div>
<script src="../assets/js/magazine-header.js"></script>
<script>
var CATTAGS={
 food:['맛집','먹스타그램','푸드스타그램','오늘뭐먹지','맛집추천','신메뉴','간편식','홈쿡','맛스타그램','식품'],
 beauty:['뷰티','뷰티스타그램','화장품추천','데일리메이크업','스킨케어','뷰티템','코스메틱','피부관리','신상뷰티','뷰티그램'],
 fashion:['패션','데일리룩','ootd','패션스타그램','코디','스타일링','패피','오오티디','룩북','일상룩'],
 tech:['IT','테크','신제품','가젯','스타트업','테크스타그램','디지털','it리뷰','얼리어답터','기술'],
 travel:['여행','여행스타그램','국내여행','여행에미치다','핫플','여행추천','호캉스','감성여행','여행지','trip'],
 promo:['이벤트','홍보','신제품출시','런칭','프로모션','체험단','기자단','협찬','공구','소식']
};
var MODS=['추천','후기','내돈내산','일상','신상','best','정보','꿀팁','스타그램','데일리'];
function clean(s){return s.replace(/\s+/g,'').replace(/[^0-9A-Za-z가-힣]/g,'');}
var selected=[];
function gen(){
 var kw=clean(document.getElementById('kw').value||'');
 if(!kw){alert('핵심 키워드를 입력하세요.');return;}
 var cat=document.getElementById('cat').value;
 var set=[];
 set.push(kw);
 MODS.forEach(function(m){set.push(kw+m);});
 CATTAGS[cat].forEach(function(t){set.push(t);});
 // dedupe
 var seen={},out=[];
 set.forEach(function(t){if(!seen[t]){seen[t]=1;out.push(t);}});
 out=out.slice(0,22);
 selected=[];
 document.getElementById('tags').innerHTML=out.map(function(t){return '<span onclick="tog(this)">#'+t+'</span>';}).join('');
 document.getElementById('cnt').textContent='('+out.length+'개)';
 document.getElementById('res').classList.add('on');
 sync();
}
function tog(el){
 var t=el.textContent;
 if(el.classList.toggle('sel')){selected.push(t);}
 else{selected=selected.filter(function(x){return x!==t;});}
 sync();
}
function sync(){
 var box=document.getElementById('copybox');
 box.textContent=selected.length?selected.join(' '):'태그를 눌러 선택하면 여기에 모입니다.';
}
function copyAll(){
 var all=[].slice.call(document.querySelectorAll('#tags span')).map(function(s){return s.textContent;});
 var text=(selected.length?selected:all).join(' ');
 if(navigator.clipboard){navigator.clipboard.writeText(text).then(function(){toast();},function(){fallback(text);});}
 else fallback(text);
}
function fallback(t){var ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand('copy');toast();}catch(e){alert('복사: '+t);}ta.remove();}
function toast(){alert('복사되었습니다.');}
</script>
</body>
</html>
