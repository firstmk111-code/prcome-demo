<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체험단·기자단 모집 — PRCOME</title>
<meta name="description" content="체험단·기자단 통합 모집 피드. 제품 체험, 기자단, 방문형·배송형 캠페인을 한곳에서 찾고 신청하세요.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../assets/css/magazine-system.css">
<script>window.MAG={root:'../',home:'../index.html',catBase:'../insights/index.html'};</script>
<style>
.subhead{padding:30px 0 6px}
.subhead .top{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap}
.subhead .crumb{font-size:12.5px;color:var(--sub);margin-bottom:12px}
.subhead h1{font-size:clamp(24px,3vw,32px);font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:12px}
.subhead h1 .tick{width:26px;height:3px;background:var(--pt);border-radius:2px}
.subhead .desc{font-size:15.5px;color:var(--sub);margin-top:10px;max-width:58ch;line-height:1.6}
.reg-btn{flex:none;height:44px;display:inline-flex;align-items:center;gap:7px;background:var(--pt);color:#fff;font-weight:700;font-size:14px;border-radius:6px;padding:0 18px}
.reg-btn:hover{background:var(--pt-2)}
.ptabs{display:flex;gap:20px;flex-wrap:wrap;border-bottom:1px solid var(--line);margin-top:22px}
.ptabs a{padding:12px 0;font-size:14px;font-weight:700;color:var(--sub);position:relative;cursor:pointer}
.ptabs a:hover{color:var(--ink)}
.ptabs a.on{color:var(--pt)}.ptabs a.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;background:var(--pt)}
.rescount{font-size:13px;color:var(--sub);margin:16px 0 4px}.rescount b{color:var(--ink)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
.card{display:block;background:var(--surf);border:1px solid var(--line);border-radius:12px;overflow:hidden}
.card:hover{border-color:var(--pt)}
.card .cv{height:130px;position:relative;overflow:hidden;background:var(--navy)}
.card .cv .accbar{position:absolute;left:0;top:0;bottom:0;width:6px}
.card .cv .kw{position:absolute;left:16px;bottom:14px;color:rgba(255,255,255,.9);font-size:18px;font-weight:800;letter-spacing:-.03em;max-width:80%}
.card .cv .type{position:absolute;left:14px;top:14px;font-size:11px;font-weight:800;color:#fff;border-radius:5px;padding:3px 9px}
.card .cv .dday{position:absolute;right:14px;top:14px;font-size:11px;font-weight:800;color:#fff;background:rgba(0,0,0,.4);border-radius:5px;padding:3px 9px}
.card .bd{padding:16px 18px}
.card .brand{font-size:12px;font-weight:700;color:var(--sub)}
.card h3{font-size:16px;font-weight:700;line-height:1.4;margin:5px 0 10px}.card:hover h3{color:var(--pt)}
.card .benefit{font-size:12.5px;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:6px;padding:8px 10px;line-height:1.5}
.card .ft{display:flex;align-items:center;justify-content:space-between;margin-top:12px;font-size:12.5px}
.card .ft .rec{color:var(--sub)}.card .ft .rec b{color:var(--pt)}
.card .ft .go{font-weight:700;color:#fff;background:var(--pt);border-radius:6px;padding:7px 14px}
.empty{padding:40px 0;color:var(--sub)}
@media (max-width:900px){.grid{grid-template-columns:1fr 1fr}}
@media (max-width:560px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="mag-header"></div>
<div class="wrap">
  <section class="subhead">
    <div class="top">
      <div>
        <div class="crumb"><a href="../index.html">홈</a> / 체험단·기자단</div>
        <h1><span class="tick"></span>체험단·기자단 모집</h1>
      </div>
      <a class="reg-btn" href="register.html">＋ 모집 등록</a>
    </div>
    <p class="desc">제품 체험단부터 기자단, 방문형·배송형 캠페인까지 한곳에서. 진행 중인 모집을 확인하고 신청하세요.</p>
  </section>

  <nav class="ptabs" id="ptabs"></nav>
  <div class="rescount" id="rescount"></div>
  <div class="grid" id="grid"></div>
  <div style="height:50px"></div>
</div>
<div id="mag-footer"></div>
<script src="../assets/js/magazine-header.js"></script>
<script>
var TYPE={all:'통합 모집 피드',experience:'체험단',press:'기자단',review:'체험후기'};
var ACC={food:'#E4612B',beauty:'#6D5DF0',tech:'#315CFF',travel:'#0FA6C0',life:'#2FA96A'};
/* [type, 브랜드, 제목, 혜택, 모집인원, 신청현황, D-day, kw, acc] */
var E=[
 ['experience','그린테이블','비건 간편식 신제품 체험단','제품 3종 무료 제공 + 원고료 3만원',20,142,'D-4','VEGAN','food'],
 ['press','뷰티랩','신제품 미디어 데이 기자단','제품 체험 + 인터뷰 기회 + 원고료',10,58,'D-2','BEAUTY','beauty'],
 ['experience','스테이호텔','시그니처 스위트 스테이 체험단','1박 숙박권(2인) + 조식 제공',6,201,'D-7','STAY','travel'],
 ['experience','핀테크앱','가계부 앱 리뷰 체험단','프리미엄 3개월 이용권 + 기프티콘',30,88,'D-5','FINTECH','tech'],
 ['press','산업전시','2026 산업 전시회 프레스 초청','현장 취재 패스 + 보도자료 키트',15,34,'D-10','EXPO','tech'],
 ['experience','오가닉푸드','유기농 반찬 정기구독 체험단','2주 구독권 + 원고료 2만원',25,176,'D-3','ORGANIC','food'],
 ['review','데일리코스메틱','수분크림 체험 후기 모음','베스트 후기 3인 추가 리워드','—',312,'진행중','REVIEW','beauty'],
 ['press','모빌리티','전기차 시승 기자단','시승 체험 + 기술 브리핑 + 원고료',8,41,'D-6','MOBILITY','tech'],
 ['experience','로컬카페','신메뉴 시식 체험단 (방문형)','신메뉴 세트 무료 + SNS 업로드',12,67,'D-8','CAFE','food']
];
var params=new URLSearchParams(location.search);
var cur=params.get('type')||'all';if(!TYPE[cur])cur='all';
document.getElementById('ptabs').innerHTML=Object.keys(TYPE).map(function(k){
 return '<a class="'+(k===cur?'on':'')+'" href="index.html'+(k==='all'?'':'?type='+k)+'">'+TYPE[k]+'</a>';
}).join('');
function render(){
 var list=cur==='all'?E:E.filter(function(e){return e[0]===cur;});
 document.getElementById('rescount').innerHTML=TYPE[cur]+' <b>'+list.length+'건</b> 모집 중';
 document.getElementById('grid').innerHTML=list.map(function(e){
  var acc=ACC[e[8]]||'#315CFF';
  var tcolor=e[0]==='press'?'#6D5DF0':e[0]==='review'?'#0FA6C0':'#E4612B';
  return '<a class="card" href="register.html">'+
   '<div class="cv" style="background:linear-gradient(135deg,#0E1B3A,#1E2E5C)"><span class="accbar" style="background:'+acc+'"></span>'+
    '<span class="type" style="background:'+tcolor+'">'+TYPE[e[0]]+'</span><span class="dday">'+e[6]+'</span>'+
    '<span class="kw">'+e[7]+'</span></div>'+
   '<div class="bd"><div class="brand">'+e[1]+'</div><h3>'+e[2]+'</h3>'+
    '<div class="benefit">🎁 '+e[3]+'</div>'+
    '<div class="ft"><span class="rec">모집 '+(e[4]==='—'?'상시':'<b>'+e[4]+'명</b>')+' · 신청 '+e[5]+'</span><span class="go">신청</span></div>'+
   '</div></a>';
 }).join('')||'<div class="empty">해당 유형의 모집이 없습니다.</div>';
}
render();
</script>
</body>
</html>
