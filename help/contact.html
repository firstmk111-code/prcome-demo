<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광고·제휴 문의 — PRCOME(피알컴)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../assets/css/magazine-system.css">
<script>window.MAG={root:'../',home:'../index.html',catBase:'../insights/index.html'};</script>
<style>
.narrow{max-width:820px}
.subhead{padding:30px 0 6px}
.subhead .crumb{font-size:12.5px;color:var(--sub);margin-bottom:12px}
.subhead h1{font-size:clamp(23px,2.8vw,30px);font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:12px}
.subhead h1 .tick{width:26px;height:3px;background:var(--pt);border-radius:2px}
.subhead .desc{font-size:15px;color:var(--sub);margin-top:10px;line-height:1.6}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:24px 0}
.ic{background:var(--surf);border:1px solid var(--line);border-radius:10px;padding:18px}
.ic b{color:var(--ink);font-size:15px}.ic p{font-size:13px;color:var(--sub);margin-top:8px}
.notice{background:var(--pt-soft);border:1px solid #cdd8ff;border-radius:8px;padding:14px 16px;font-size:13px;color:var(--navy);margin-bottom:20px}
.fcard{background:var(--surf);border:1px solid var(--line);border-radius:8px;padding:28px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.row{margin-bottom:16px}
.row>label{display:block;font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:7px}
.req{color:var(--pt)}
.inp,.sel,.ta{width:100%;font-family:inherit;font-size:14.5px;color:var(--ink);background:var(--surf);border:1px solid var(--line-2);border-radius:4px;padding:0 13px;height:48px;outline:0}
.ta{height:auto;padding:12px 13px;min-height:150px;line-height:1.6;resize:vertical}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--pt);box-shadow:0 0 0 3px var(--pt-soft)}
.foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:6px}
.btn{min-height:44px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;font-family:inherit;font-size:14px;font-weight:700;padding:0 20px;border:1px solid var(--line-2);background:var(--surf);color:var(--ink)}
.btn:hover{border-color:var(--pt);color:var(--pt)}
.btn.pri{background:var(--pt);color:#fff;border-color:var(--pt)}.btn.pri:hover{background:var(--pt-2);color:#fff}
@media (max-width:640px){.cards{grid-template-columns:1fr}.g2{grid-template-columns:1fr}.fcard{padding:20px}}
</style>
</head>
<body>
<div id="mag-header"></div>
<div class="wrap narrow">
  <section class="subhead">
    <div class="crumb"><a href="../index.html">홈</a> / 광고·제휴 문의</div>
    <h1><span class="tick"></span>광고·제휴 문의</h1>
    <p class="desc">PRCOME과 함께할 광고·콘텐츠 제휴, 파트너십을 제안해 주세요.</p>
  </section>

  <div class="cards">
    <div class="ic"><b>광고 문의</b><p>배너·콘텐츠 광고, 스폰서십</p></div>
    <div class="ic"><b>콘텐츠 제휴</b><p>인사이트·매거진 공동 기획</p></div>
    <div class="ic"><b>서비스 제휴</b><p>도구·데이터·API 연동</p></div>
  </div>

  <div class="notice">1차 데모 가안입니다. 실제 접수는 준비 중이며, 문의는 아래 이메일로 보내주셔도 됩니다 — <b>partner@prcome.example</b></div>

  <form class="fcard" onsubmit="event.preventDefault();alert('데모 가안입니다. 실제 접수는 준비 중입니다.');">
    <div class="g2">
      <div class="row"><label>회사·기관명 <span class="req">*</span></label><input class="inp" placeholder="회사명"></div>
      <div class="row"><label>담당자명 <span class="req">*</span></label><input class="inp" placeholder="이름"></div>
    </div>
    <div class="g2">
      <div class="row"><label>이메일 <span class="req">*</span></label><input class="inp" type="email" placeholder="name@company.com"></div>
      <div class="row"><label>문의 유형</label><select class="sel"><option>광고 문의</option><option>콘텐츠 제휴</option><option>서비스 제휴</option><option>기타</option></select></div>
    </div>
    <div class="row"><label>문의 내용 <span class="req">*</span></label><textarea class="ta" placeholder="제안 내용을 자유롭게 작성해 주세요."></textarea></div>
    <div class="foot"><a class="btn" href="../index.html">취소</a><button type="submit" class="btn pri">문의 보내기</button></div>
  </form>
  <div style="height:60px"></div>
</div>
<div id="mag-footer"></div>
<script src="../assets/js/magazine-header.js"></script>
</body>
</html>
