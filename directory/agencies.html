.drow:hover .go{background:var(--pt-2)}
.drow mark{background:#FFF3C4;border-radius:2px}
.empty{padding:36px 0;color:var(--sub-2)}
.note{font-size:12.5px;color:var(--sub-2);line-height:1.7;margin:26px 0 60px;padding-top:18px;border-top:1px solid var(--line)}

function ini(n){var s=n.replace(/^[㈜（）()주\s]+/,'');return s.charAt(0)||n.charAt(0);}
function esc(s){return s.replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function hl(s,q){if(!q)return esc(s);return esc(s).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'),'<mark>$1</mark>');}

 var list=CO.filter(function(c){

 document.getElementById('dlist').innerHTML=list.map(function(c){
