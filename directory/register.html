<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR·마케팅회사 등록 — PRCOME</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../assets/css/magazine-system.css">
<script>window.MAG={root:'../',home:'../index.html',catBase:'../insights/index.html'};</script>
<style>
.narrow{max-width:840px}
.subhead{padding:30px 0 6px}
.subhead .crumb{font-size:12.5px;color:var(--sub);margin-bottom:12px}
.subhead h1{font-size:clamp(23px,2.8vw,30px);font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:12px}
.subhead h1 .tick{width:26px;height:3px;background:var(--pt);border-radius:2px}
.subhead .desc{font-size:15px;color:var(--sub);margin-top:10px;line-height:1.6}
.notice{background:var(--pt-soft);border:1px solid #cdd8ff;border-radius:6px;padding:13px 16px;font-size:13px;color:var(--navy);margin:20px 0}
.fcard{background:var(--surf);border:1px solid var(--line);border-radius:8px;padding:28px}
.step{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:16px}
.row{margin-bottom:16px}
.row>label{display:block;font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:7px}
.row .req{color:var(--pt)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.inp,.sel,.ta{width:100%;font-family:inherit;font-size:14.5px;color:var(--ink);background:var(--surf);border:1px solid var(--line-2);border-radius:4px;padding:0 13px;height:48px;outline:0}
.ta{height:auto;padding:12px 13px;min-height:150px;line-height:1.6;resize:vertical}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--pt);box-shadow:0 0 0 3px var(--pt-soft)}
.hr{height:1px;background:var(--line);margin:22px 0}
.foot{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.btn{min-height:44px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;font-family:inherit;font-size:14px;font-weight:700;padding:0 20px;border:1px solid var(--line-2);background:var(--surf);color:var(--ink)}
.btn:hover{border-color:var(--pt);color:var(--pt)}
.btn.pri{background:var(--pt);color:#fff;border-color:var(--pt)}.btn.pri:hover{background:var(--pt-2);color:#fff}
@media (max-width:640px){.g2{grid-template-columns:1fr}.fcard{padding:20px}}
</style>
</head>
<body>
<div id="mag-header"></div>
<div class="wrap narrow">
  <section class="subhead">
    <div class="crumb"><a href="../index.html">홈</a> / <a href="index.html">기업·미디어</a> / 회사 등록</div>
    <h1><span class="tick"></span>PR·마케팅회사 등록</h1>
    <p class="desc">우리 회사를 PRCOME 디렉토리에 등록하고, 프로젝트를 찾는 기업과 연결되세요.</p>
  </section>

  <div class="notice">1차 데모 가안입니다. 등록·심사 기능은 준비 중이며, 아래 폼은 입력 흐름 확인용입니다.</div>

  <form class="fcard" onsubmit="event.preventDefault();alert('데모 가안입니다. 실제 등록은 준비 중입니다.');">
    <div class="step">회사 정보</div>
    <div class="row"><label>회사명 <span class="req">*</span></label><input class="inp" placeholder="예: 브릿지커뮤니케이션즈"></div>
    <div class="g2">
      <div class="row"><label>대표 분야 <span class="req">*</span></label><select class="sel"><option>종합PR</option><option>디지털 마케팅</option><option>퍼포먼스</option><option>콘텐츠</option><option>브랜드 컨설팅</option><option>공공·지역</option></select></div>
      <div class="row"><label>지역</label><select class="sel"><option>서울</option><option>경기·인천</option><option>부산·경남</option><option>대구·경북</option><option>대전·충청</option><option>광주·전라</option></select></div>
    </div>
    <div class="g2">
      <div class="row"><label>규모</label><select class="sel"><option>1~10인</option><option>11~50인</option><option>50인 이상</option></select></div>
      <div class="row"><label>설립연도</label><input class="inp" placeholder="예: 2016"></div>
    </div>
    <div class="row"><label>회사 소개 <span class="req">*</span></label><textarea class="ta" placeholder="주요 서비스, 강점, 대표 레퍼런스를 소개해 주세요."></textarea></div>
    <div class="row"><label>전문 태그</label><input class="inp" placeholder="쉼표로 구분 (예: IT·B2B, 미디어관계, 스타트업)"></div>
    <div class="row"><label>담당자 연락처 <span class="req">*</span></label><input class="inp" placeholder="이메일 또는 전화번호"></div>
    <div class="hr"></div>
    <div class="foot"><a class="btn" href="agencies.html">취소</a><button type="submit" class="btn pri">등록 신청</button></div>
  </form>
  <div style="height:60px"></div>
</div>
<div id="mag-footer"></div>
<script src="../assets/js/magazine-header.js"></script>
</body>
</html>
