<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR회사 소개 | PRCOME</title>
<meta name="description" content="PRCOME PR회사 상세 소개 — 회사 정보, 제공 서비스, 업종, 대표자, 공식 홈페이지와 자주 묻는 질문.">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../assets/css/magazine-system.css?v=2">
<script>window.MAG={root:'../',home:'../index.html',catBase:'../insights/index.html'};</script>
<style>
.subhead{padding:30px 0 6px}.subhead .crumb{font-size:12.5px;color:var(--sub);margin-bottom:12px}
.subhead .crumb a:hover{color:var(--pt)}
.chead{display:flex;align-items:center;gap:16px;margin-top:6px}
.chead .lg{width:60px;height:60px;flex:none;border-radius:14px;background:var(--pt-soft);color:var(--pt);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px}
.chead h1{font-size:clamp(24px,3vw,32px);font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.chead .gbadge{font-size:11px;font-weight:800;color:#fff;background:var(--navy);border-radius:5px;padding:3px 9px}
.chead .rep{font-size:13.5px;color:var(--sub);margin-top:6px}
.homebtn{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:#fff;background:var(--pt);border-radius:9px;padding:13px 22px}
.homebtn:hover{background:var(--pt-2)}
.homewrap{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:20px 22px;margin:14px 0}
.homewrap .u{font-size:13px;color:var(--sub);word-break:break-all}
</style>
</head>
<body>
<div id="mag-header"></div>
<div class="wrap">
  <section class="subhead">
    <div class="crumb" id="crumb"><a href="../index.html">홈</a> / <a href="index.html">기업·미디어</a> / <a href="agencies.html">PR회사</a></div>
    <div class="chead" id="chead"></div>
  </section>
  <div class="hub" id="hub"></div>
  <div style="height:50px"></div>
</div>
<div id="mag-footer"></div>
<script src="companies.js?v=2"></script>
<script>
(function(){
  var CO=window.PR_COMPANIES||[], GLOBAL=window.PR_GLOBAL||{};
  var idx=parseInt(new URLSearchParams(location.search).get('c'),10);
  var co=CO[idx];
  if(!co){ location.replace('agencies.html'); return; }
  var name=co[0], rep=co[1], url=co[2], g=!!GLOBAL[name];
  function ini(n){var s=n.replace(/^[㈜（）()주\s]+/,'');return s.charAt(0)||n.charAt(0);}
  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
  var kind=g?'글로벌 네트워크 PR·커뮤니케이션 회사':'국내 PR·커뮤니케이션(광고·홍보 대행) 회사';

  /* --- SEO: title / description / FAQ (헤더 injectSEO 전에 설정) --- */
  document.title=name+' — PR회사 소개·정보·홈페이지 | PRCOME';
  var descTxt=name+'은(는) 대표 '+rep+'가 이끄는 '+kind+'입니다. 제공 서비스, 업종·업태, 공식 홈페이지, 홍보대행 의뢰 방법과 자주 묻는 질문을 PRCOME에서 확인하세요.';
  var md=document.querySelector('meta[name="description"]'); if(md) md.setAttribute('content',descTxt);
  window.SEO={ faq:[
    {q:name+'은(는) 어떤 회사인가요?',a:name+'은(는) '+kind+'입니다. 언론홍보(보도자료·미디어 릴레이션), 브랜드 커뮤니케이션, 위기관리, 콘텐츠·디지털 PR 등 PR 전반의 서비스를 제공합니다.'},
    {q:name+'의 대표는 누구인가요?',a:'공개 자료 기준 대표(대표자)는 '+rep+'입니다. 최신 정보는 공식 홈페이지에서 확인하세요.'},
    {q:name+'에 홍보대행을 의뢰하려면 어떻게 하나요?',a:'공식 홈페이지를 통해 직접 문의하거나, PRCOME <a href="../projects/new.html">홍보대행 의뢰 등록</a>에서 업무·예산을 남기면 적합한 회사와 매칭됩니다. 예상 비용은 <a href="../tools/rate-card.html">PR 단가표</a>를 참고하세요.'},
    {q:name+'은(는) 국내사인가요, 글로벌사인가요?',a:g?name+'은(는) 글로벌 네트워크를 갖춘 외국계 PR회사로, 해외 진출·다국가 캠페인·글로벌 위기관리에 강점이 있습니다.':name+'은(는) 국내 PR·커뮤니케이션 회사로, 한국 미디어 환경과 기자 관계에 대한 이해가 강점입니다.'},
    {q:'비슷한 PR회사와 비교하려면?',a:'<a href="agencies.html">PR회사 디렉토리</a>에서 업종·예산·국내/글로벌 기준으로 다른 회사를 비교하고, 선택 기준 체크리스트를 확인할 수 있습니다.'}
  ]};

  /* --- Organization 구조화 데이터 (회사) --- */
  var ld=document.createElement('script'); ld.type='application/ld+json';
  ld.textContent=JSON.stringify({"@context":"https://schema.org","@type":"Organization","name":name,"url":url,"description":kind,"founder":rep,"areaServed":"KR","knowsAbout":["PR","언론홍보","보도자료","브랜드 커뮤니케이션","위기관리"]});
  document.head.appendChild(ld);

  /* --- breadcrumb에 회사명 추가 --- */
  document.getElementById('crumb').insertAdjacentHTML('beforeend',' / '+esc(name));

  /* --- 헤더(회사명/대표/배지) --- */
  document.getElementById('chead').innerHTML=
    '<span class="lg">'+esc(ini(name))+'</span>'+
    '<div><h1>'+esc(name)+(g?'<span class="gbadge">글로벌</span>':'')+'</h1>'+
    '<div class="rep">대표 '+esc(rep)+' · '+(g?'외국계·글로벌':'국내')+' PR회사</div></div>';

  /* --- 관련 회사 3곳 (같은 구분 우선) --- */
  var rel=[]; for(var i=0;i<CO.length && rel.length<3;i++){ if(i===idx)continue; if(!!GLOBAL[CO[i][0]]===g) rel.push(i); }
  for(var j=0;j<CO.length && rel.length<3;j++){ if(j!==idx && rel.indexOf(j)<0) rel.push(j); }
  var relHtml=rel.map(function(i){var c=CO[i];return '<a class="relcard" href="company.html?c='+i+'"><div class="k">PR회사</div><div class="t">'+esc(c[0])+'</div><div class="d">대표 '+esc(c[1])+' · '+(!!GLOBAL[c[0]]?'글로벌':'국내')+'</div><span class="arw">자세히 →</span></a>';}).join('');

  /* --- 본문 --- */
  document.getElementById('hub').innerHTML=
    '<div class="homewrap"><div><div style="font-size:12px;font-weight:800;color:var(--sub-2);letter-spacing:.03em">공식 홈페이지</div><div class="u">'+esc(url)+'</div></div>'+
      '<a class="homebtn" href="'+esc(url)+'" target="_blank" rel="noopener nofollow">공식 홈페이지 방문 →</a></div>'+

    '<section class="hsec" id="intro"><h2><span class="n">01</span>회사 소개</h2>'+
    '<p><strong>'+esc(name)+'</strong>은(는) 대표 '+esc(rep)+'가 이끄는 '+kind+'입니다. 기업·브랜드·기관을 대신해 <strong>언론과 대중과의 관계</strong>를 설계하고, 보도자료·미디어 릴레이션부터 브랜드 커뮤니케이션 전략, 위기관리, 콘텐츠·디지털 PR까지 PR 전반을 지원합니다.</p>'+
    (g?'<div class="callout"><b>글로벌 네트워크</b> — 해외 미디어·다국가 캠페인·글로벌 위기관리에 강점이 있는 외국계 PR회사입니다. 해외 진출·글로벌 브랜딩을 검토 중이라면 우선 후보로 고려할 수 있습니다.</div>':'')+
    '</section>'+

    '<section class="hsec" id="info"><h2><span class="n">02</span>회사 정보</h2>'+
    '<table class="deftable"><tbody>'+
    '<tr><th style="width:130px">회사명</th><td><b>'+esc(name)+'</b></td></tr>'+
    '<tr><th>대표자</th><td>'+esc(rep)+'</td></tr>'+
    '<tr><th>업태</th><td>서비스업</td></tr>'+
    '<tr><th>업종</th><td>'+(g?'PR·커뮤니케이션(글로벌 네트워크)':'PR·커뮤니케이션(광고·홍보 대행)')+'</td></tr>'+
    '<tr><th>구분</th><td>'+(g?'외국계·글로벌':'국내')+'</td></tr>'+
    '<tr><th>공식 홈페이지</th><td><a href="'+esc(url)+'" target="_blank" rel="noopener nofollow" style="color:var(--pt);font-weight:600">'+esc(url)+'</a></td></tr>'+
    '</tbody></table><p style="font-size:12.5px;color:var(--sub-2)">※ 한국PR협회 공개 자료 기준 참고용 정보이며 변동될 수 있습니다.</p></section>'+

    '<section class="hsec" id="services"><h2><span class="n">03</span>제공 서비스(일반)</h2>'+
    '<ul class="bul">'+
    '<li><strong>언론홍보</strong> — 보도자료 작성·배포, 기자 관계, 인터뷰·기고, 취재 대응</li>'+
    '<li><strong>브랜드 커뮤니케이션</strong> — 메시지 전략, 스토리텔링, 캠페인 기획</li>'+
    '<li><strong>위기관리</strong> — 이슈 모니터링, 대응 시나리오, 리스크 커뮤니케이션</li>'+
    '<li><strong>콘텐츠·디지털 PR</strong> — 오너드미디어, 소셜, 검색·AI 노출(SEO·AEO·GEO)</li>'+
    '</ul><p style="font-size:12.5px;color:var(--sub-2)">※ 실제 제공 서비스·전문 분야는 회사마다 다릅니다. 정확한 범위는 공식 홈페이지에서 확인하세요.</p></section>'+

    '<section class="hsec" id="faq"><h2><span class="n">04</span>자주 묻는 질문</h2><div class="faq" id="faqList"></div></section>'+

    '<section class="hsec" id="related"><h2><span class="n">05</span>비슷한 PR회사</h2><div class="relgrid">'+relHtml+'</div></section>'+

    '<section class="cta"><div class="ct-l"><h2>이 회사와 협업을 검토 중이신가요?</h2>'+
    '<p>PRCOME에서 홍보대행을 의뢰하면 업종·예산에 맞는 회사와 매칭됩니다. 비용은 단가표에서, 비교는 디렉토리에서 확인하세요.</p></div>'+
    '<div class="ct-b"><a class="btn pri" href="../projects/new.html">홍보대행 의뢰</a><a class="btn sec" href="agencies.html">다른 회사 비교</a><a class="btn sec" href="../tools/rate-card.html">PR 단가표</a></div></section>'+

    '<div class="homewrap"><div><div style="font-size:12px;font-weight:800;color:var(--sub-2);letter-spacing:.03em">'+esc(name)+' 공식 홈페이지</div><div class="u">'+esc(url)+'</div></div>'+
      '<a class="homebtn" href="'+esc(url)+'" target="_blank" rel="noopener nofollow">공식 홈페이지 방문 →</a></div>'+

    '<div class="tagrow"><a class="tg" href="agencies.html">PR회사</a><a class="tg" href="../projects/new.html">홍보대행</a><a class="tg" href="../tools/rate-card.html">PR단가</a><a class="tg" href="../directory/media.html">언론사</a></div>';
})();
</script>
<script src="../assets/js/magazine-header.js?v=2"></script>
</body>
</html>
