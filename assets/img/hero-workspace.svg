<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 640" width="800" height="640" role="img" aria-label="PR·마케팅 실무 워크스페이스 일러스트 (교체 가능)">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1B2333"/>
      <stop offset="1" stop-color="#243559"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F3F5F9"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0B1020" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="640" fill="url(#bg)"/>
  <circle cx="640" cy="120" r="150" fill="#315CFF" opacity="0.25"/>
  <circle cx="150" cy="540" r="120" fill="#C8FF3D" opacity="0.16"/>
  <!-- 점 패턴 -->
  <g fill="#FFFFFF" opacity="0.06">
    <circle cx="70" cy="70" r="2"/><circle cx="120" cy="70" r="2"/><circle cx="170" cy="70" r="2"/>
    <circle cx="70" cy="120" r="2"/><circle cx="120" cy="120" r="2"/><circle cx="170" cy="120" r="2"/>
    <circle cx="700" cy="520" r="2"/><circle cx="740" cy="520" r="2"/><circle cx="700" cy="560" r="2"/><circle cx="740" cy="560" r="2"/>
  </g>

  <!-- 메인 에디터 카드 (콘텐츠 검토 화면) -->
  <g filter="url(#sh)">
    <rect x="150" y="120" width="470" height="330" rx="18" fill="url(#card)"/>
    <!-- 상단바 -->
    <rect x="150" y="120" width="470" height="46" rx="18" fill="#EDEFF3"/>
    <rect x="150" y="150" width="470" height="16" fill="#EDEFF3"/>
    <circle cx="178" cy="143" r="5" fill="#D64C4C"/><circle cx="196" cy="143" r="5" fill="#E7B23B"/><circle cx="214" cy="143" r="5" fill="#4CAF6E"/>
    <rect x="250" y="134" width="230" height="18" rx="9" fill="#FFFFFF" stroke="#DFE3EA"/>
    <text x="266" y="147" font-family="Inter, Pretendard, sans-serif" font-size="11" fill="#9AA0AB">보도자료 초안 · 검토</text>
    <!-- 본문 카테고리 태그 -->
    <rect x="182" y="192" width="52" height="20" rx="6" fill="#E9EDFF"/>
    <text x="192" y="206" font-family="Inter, Pretendard, sans-serif" font-size="11" font-weight="700" fill="#2448D8">AEO·GEO</text>
    <!-- 제목 라인 -->
    <rect x="182" y="224" width="330" height="16" rx="6" fill="#1B2333"/>
    <rect x="182" y="248" width="270" height="12" rx="6" fill="#C7CCD6"/>
    <!-- 하이라이트(라임) -->
    <rect x="182" y="276" width="406" height="30" rx="8" fill="#F2FBDD"/>
    <rect x="182" y="276" width="6" height="30" rx="3" fill="#C8FF3D"/>
    <rect x="200" y="286" width="300" height="10" rx="5" fill="#8F9A57"/>
    <!-- 본문 라인 -->
    <rect x="182" y="322" width="406" height="9" rx="4" fill="#DDE1E8"/>
    <rect x="182" y="340" width="380" height="9" rx="4" fill="#DDE1E8"/>
    <rect x="182" y="358" width="410" height="9" rx="4" fill="#DDE1E8"/>
    <!-- 차트 미니 -->
    <rect x="182" y="386" width="180" height="46" rx="10" fill="#F3F5F9" stroke="#E4E6EA"/>
    <rect x="196" y="416" width="14" height="8" rx="2" fill="#315CFF"/>
    <rect x="216" y="408" width="14" height="16" rx="2" fill="#315CFF"/>
    <rect x="236" y="400" width="14" height="24" rx="2" fill="#315CFF"/>
    <rect x="256" y="396" width="14" height="28" rx="2" fill="#C8FF3D"/>
    <rect x="276" y="404" width="14" height="20" rx="2" fill="#315CFF"/>
    <text x="322" y="404" font-family="Inter, sans-serif" font-size="10" fill="#9AA0AB">검색 가시성</text>
    <!-- 배포 버튼 -->
    <rect x="452" y="392" width="136" height="40" rx="10" fill="#315CFF"/>
    <text x="520" y="417" text-anchor="middle" font-family="Inter, Pretendard, sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">배포 매칭 →</text>
  </g>

  <!-- 보조 카드 (매체 매칭) -->
  <g filter="url(#sh)">
    <rect x="470" y="330" width="210" height="150" rx="16" fill="#FFFFFF"/>
    <text x="490" y="362" font-family="Inter, Pretendard, sans-serif" font-size="12" font-weight="800" fill="#1B2333">매체 매칭</text>
    <g font-family="Inter, Pretendard, sans-serif" font-size="11" fill="#4A515E">
      <circle cx="498" cy="388" r="10" fill="#EDEFF3"/><text x="514" y="392">경제산업신문</text>
      <rect x="620" y="381" width="40" height="16" rx="8" fill="#E3F5EC"/><text x="628" y="393" font-size="10" font-weight="700" fill="#12885A">96%</text>
      <circle cx="498" cy="416" r="10" fill="#EDEFF3"/><text x="514" y="420">테크리포트</text>
      <rect x="620" y="409" width="40" height="16" rx="8" fill="#E9EDFF"/><text x="628" y="421" font-size="10" font-weight="700" fill="#2448D8">88%</text>
      <circle cx="498" cy="444" r="10" fill="#EDEFF3"/><text x="514" y="448">데일리커머스</text>
      <rect x="620" y="437" width="40" height="16" rx="8" fill="#E9EDFF"/><text x="628" y="449" font-size="10" font-weight="700" fill="#2448D8">84%</text>
    </g>
  </g>

  <!-- 플로팅 태그 -->
  <g font-family="Inter, Pretendard, sans-serif" font-weight="700">
    <g filter="url(#sh)"><rect x="112" y="250" width="70" height="34" rx="17" fill="#C8FF3D"/><text x="147" y="272" text-anchor="middle" font-size="13" fill="#111318">GEO</text></g>
    <g filter="url(#sh)"><rect x="560" y="150" width="86" height="34" rx="17" fill="#FFFFFF"/><text x="603" y="172" text-anchor="middle" font-size="13" fill="#315CFF">언론사</text></g>
    <g filter="url(#sh)"><rect x="118" y="420" width="64" height="34" rx="17" fill="#FFFFFF"/><text x="150" y="442" text-anchor="middle" font-size="13" fill="#111318">PR</text></g>
  </g>
</svg>
