<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>로그인 — PRCOME(피알컴)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../assets/css/magazine-system.css">
<script>window.MAG={root:'../',home:'../index.html',catBase:'../insights/index.html'};</script>
<style>
.auth-wrap{max-width:420px;margin:0 auto;padding:48px 24px 60px}
.auth-card{background:var(--surf);border:1px solid var(--line);border-radius:12px;padding:34px}
.auth-card .brand{display:flex;align-items:center;justify-content:center;gap:8px;font-weight:800;font-size:22px;letter-spacing:-.04em;margin-bottom:14px}
.auth-card .brand .dot{width:10px;height:10px;background:var(--pt);border-radius:2px;transform:rotate(45deg)}
.auth-card h1{font-size:23px;font-weight:800;letter-spacing:-.03em;text-align:center}
.auth-card .sub{font-size:13.5px;color:var(--sub);text-align:center;margin-top:8px;line-height:1.5}
.oauth{display:flex;flex-direction:column;gap:9px;margin:22px 0 4px}
.oauth button{display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit;font-size:14px;font-weight:700;color:var(--ink);background:var(--surf);border:1px solid var(--line-2);border-radius:6px;padding:12px;cursor:pointer}
.oauth button:hover{border-color:var(--pt)}
.sep{display:flex;align-items:center;gap:12px;font-size:12px;color:var(--sub-2);margin:20px 0}
.sep::before,.sep::after{content:"";flex:1;height:1px;background:var(--line)}
.row{margin-bottom:14px}
.row label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
.inp{width:100%;height:48px;font-family:inherit;font-size:14.5px;color:var(--ink);background:var(--surf);border:1px solid var(--line-2);border-radius:4px;padding:0 13px;outline:0}
.inp:focus{border-color:var(--pt);box-shadow:0 0 0 3px var(--pt-soft)}
.opts{display:flex;align-items:center;justify-content:space-between;font-size:13px;margin:6px 0 18px}
.opts label{display:flex;align-items:center;gap:7px;color:var(--sub);font-weight:500}
.opts a{color:var(--pt);font-weight:600}
.submit{width:100%;height:50px;background:var(--pt);color:#fff;border:0;border-radius:6px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
.submit:hover{background:var(--pt-2)}
.foot{text-align:center;margin-top:22px;font-size:14px;color:var(--sub)}.foot a{color:var(--pt);font-weight:700}
.demo{text-align:center;margin-top:16px;font-size:12.5px;color:var(--sub-2)}
</style>
</head>
<body>
<div id="mag-header"></div>
<div class="auth-wrap">
  <div class="auth-card">
    <a class="brand" href="../index.html"><span class="dot"></span>PRCOME</a>
    <h1>로그인</h1>
    <p class="sub">PR·마케팅 실무자 커뮤니티에 오신 것을 환영합니다.</p>

    <div class="oauth">
      <button onclick="demo()"><span style="color:#03C75A;font-weight:800">N</span> 네이버로 계속하기</button>
      <button onclick="demo()"><span style="font-weight:800">K</span> 카카오로 계속하기</button>
    </div>
    <div class="sep">또는 이메일로 로그인</div>

    <form onsubmit="event.preventDefault();demo();">
      <div class="row"><label>이메일</label><input class="inp" type="email" placeholder="name@company.com"></div>
      <div class="row"><label>비밀번호</label><input class="inp" type="password" placeholder="비밀번호 입력"></div>
      <div class="opts">
        <label><input type="checkbox"> 로그인 유지</label>
        <a href="password-reset.html">비밀번호 찾기</a>
      </div>
      <button class="submit" type="submit">로그인</button>
    </form>

    <p class="foot">아직 회원이 아니신가요? <a href="signup.html">회원가입</a></p>
  </div>
  <p class="demo">1차 데모 가안 — 실제 인증은 준비 중입니다.</p>
</div>
<div id="mag-footer"></div>
<script src="../assets/js/magazine-header.js"></script>
<script>function demo(){alert('1차 데모 가안입니다. 실제 로그인은 준비 중입니다.');location.href='../index.html';}</script>
</body>
</html>
