<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>프로젝트 등록 — PRCOME 프로젝트</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../assets/css/magazine-system.css?v=2">
<script>window.MAG={root:'../',home:'../index.html',catBase:'../insights/index.html'};</script>
<style>
.narrow{max-width:840px}
.subhead{padding:30px 0 6px}
.subhead .crumb{font-size:12.5px;color:var(--sub);margin-bottom:12px}
.subhead h1{font-size:clamp(23px,2.8vw,30px);font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:12px}
.subhead h1 .tick{width:26px;height:3px;background:var(--pt);border-radius:2px}
.subhead .desc{font-size:15px;color:var(--sub);margin-top:10px;line-height:1.6}
.notice{background:var(--pt-soft);border:1px solid #cdd8ff;border-radius:6px;padding:13px 16px;font-size:13px;color:var(--navy);margin:20px 0}
.fcard{background:var(--surf);border:1px solid var(--line);border-radius:8px;padding:28px}
.step{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:16px;display:flex;align-items:center;gap:9px}
.step .no{width:22px;height:22px;border-radius:5px;background:var(--pt);color:#fff;font-size:12px;display:flex;align-items:center;justify-content:center}
.row{margin-bottom:16px}
.row>label{display:block;font-size:13.5px;font-weight:700;color:var(--ink);margin-bottom:7px}
.row .req{color:var(--pt)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.inp,.sel,.ta{width:100%;font-family:inherit;font-size:14.5px;color:var(--ink);background:var(--surf);border:1px solid var(--line-2);border-radius:4px;padding:0 13px;height:48px;outline:0}
.ta{height:auto;padding:12px 13px;min-height:190px;line-height:1.6;resize:vertical}
.inp:focus,.sel:focus,.ta:focus{border-color:var(--pt);box-shadow:0 0 0 3px var(--pt-soft)}
.hr{height:1px;background:var(--line);margin:24px 0}
.foot{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.btn{min-height:44px;display:inline-flex;align-items:center;justify-content:center;border-radius:4px;font-family:inherit;font-size:14px;font-weight:700;padding:0 20px;border:1px solid var(--line-2);background:var(--surf);color:var(--ink)}
.btn:hover{border-color:var(--pt);color:var(--pt)}
.btn.pri{background:var(--pt);color:#fff;border-color:var(--pt)}.btn.pri:hover{background:var(--pt-2);color:#fff}
.foot .r{display:flex;gap:8px}
@media (max-width:640px){.g2{grid-template-columns:1fr}.fcard{padding:20px}}
</style>
</head>
<body>
<div id="mag-header"></div>
<div class="wrap narrow">
  <section class="subhead">
    <div class="crumb"><a href="../index.html">홈</a> / <a href="index.html">프로젝트</a> / 등록</div>
    <h1><span class="tick"></span>프로젝트 의뢰 등록</h1>
    <p class="desc">홍보·마케팅 업무를 맡길 파트너를 찾고 있다면, 아래 정보를 입력해 의뢰를 등록하세요.</p>
  </section>

  <div class="notice">1차 데모 가안입니다. 등록·게시 기능은 준비 중이며, 아래 폼은 입력 흐름 확인용입니다.</div>

  <form class="fcard" onsubmit="event.preventDefault();alert('데모 가안입니다. 실제 등록은 준비 중입니다.');">
    <div class="step"><span class="no">1</span>기본 정보</div>
    <div class="row"><label>프로젝트 제목 <span class="req">*</span></label>
      <input class="inp" placeholder="예: 식품 브랜드 신제품 언론홍보 대행사 모집"></div>
    <div class="g2">
      <div class="row"><label>분야 <span class="req">*</span></label>
        <select class="sel"><option>언론홍보</option><option>보도자료 작성·배포</option><option>콘텐츠 마케팅</option><option>SEO·AEO·GEO</option><option>브랜드 컨설팅</option><option>디자인·영상</option><option>기타 PR·마케팅 업무</option></select></div>
      <div class="row"><label>진행 방식</label>
        <select class="sel"><option>원격 협업 가능</option><option>대면 미팅 필수</option><option>혼합</option></select></div>
    </div>

    <div class="hr"></div>
    <div class="step"><span class="no">2</span>예산 · 일정</div>
    <div class="g2">
      <div class="row"><label>예산 범위 <span class="req">*</span></label>
        <select class="sel"><option>~ 100만원</option><option>100~300만원</option><option>300~500만원</option><option>500~1,000만원</option><option>1,000만원 이상</option><option>월 단위 계약</option><option>협의</option></select></div>
      <div class="row"><label>진행 기간</label>
        <select class="sel"><option>단건 (2주 이내)</option><option>1개월</option><option>2~3개월</option><option>6개월</option><option>장기·상시</option></select></div>
    </div>
    <div class="g2">
      <div class="row"><label>착수 희망일</label><input class="inp" type="date"></div>
      <div class="row"><label>모집 마감일</label><input class="inp" type="date"></div>
    </div>

    <div class="hr"></div>
    <div class="step"><span class="no">3</span>상세 내용</div>
    <div class="row"><label>프로젝트 설명 <span class="req">*</span></label>
      <textarea class="ta" placeholder="프로젝트 개요, 진행 범위, 우대 사항, 제안 방법 등을 자유롭게 작성해 주세요."></textarea></div>
    <div class="row"><label>필요 역량 태그</label>
      <input class="inp" placeholder="쉼표로 구분 (예: 식품홍보, 미디어관계, 지면기사화)"></div>

    <div class="hr"></div>
    <div class="foot">
      <a class="btn" href="index.html">취소</a>
      <div class="r"><button type="button" class="btn">미리보기</button><button type="submit" class="btn pri">프로젝트 등록</button></div>
    </div>
  </form>
  <div style="height:60px"></div>
</div>

<div id="mag-footer"></div>
<script src="../assets/js/magazine-header.js?v=2"></script>
</body>
</html>
