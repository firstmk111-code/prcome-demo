<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>회사 문의 — PRCOME 프로젝트·매칭</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../assets/css/magazine-system.css?v=2">
<script>window.MAG={root:'../',home:'../index.html',catBase:'../insights/index.html'};</script>
<style>
.subhead{padding:30px 0 6px}.subhead .crumb{font-size:12.5px;color:var(--sub);margin-bottom:12px}
.subhead h1{font-size:clamp(24px,3vw,32px);font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:12px}
.subhead h1 .tick{width:26px;height:3px;background:var(--pt);border-radius:2px}
.subhead .desc{font-size:15.5px;color:var(--sub);margin-top:10px;max-width:56ch;line-height:1.6}
.form{max-width:720px;padding:24px 0}
.note{background:var(--pt-soft);border:1px solid #cdd8ff;color:var(--pt-2);border-radius:6px;padding:12px 15px;font-size:13.5px;margin-bottom:20px}
.fr{margin-bottom:16px}.fr label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}.fr .req{color:var(--pt)}
.fr input,.fr select,.fr textarea{width:100%;border:1px solid var(--line-2);border-radius:4px;padding:11px 13px;font-family:inherit;font-size:14.5px}
.fr input,.fr select{height:48px}.fr textarea{min-height:120px;resize:vertical}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.actions{display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--line);padding-top:18px}
.btn{height:44px;border-radius:4px;font-weight:700;font-size:14.5px;padding:0 20px;border:1px solid var(--line-2);background:#fff}
.btn.pri{background:var(--pt);color:#fff;border-color:var(--pt)}
@media (max-width:640px){.g2{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="mag-header"></div>
<div class="wrap">
  <section class="subhead">
    <div class="crumb"><a href="../index.html">홈</a> / <a href="index.html">프로젝트·매칭</a> / 회사 문의</div>
    <h1><span class="tick"></span>PR·마케팅회사에 문의하기</h1>
    <p class="desc">원하는 대행사·전문가에게 프로젝트 조건을 정리해 문의를 보냅니다. 검토 후 회신을 받게 됩니다.</p>
  </section>
  <form class="form" onsubmit="event.preventDefault();alert('준비 중인 기능입니다. 문의 발송은 회원 로그인 후 제공됩니다. (1차 정적 가안)');">
    <div class="note">1차 정적 가안입니다. 실제 발송·회신은 준비 중이며, 아래는 입력 흐름 확인용입니다.</div>
    <div class="g2">
      <div class="fr"><label>문의 대상</label><select><option>브릿지커뮤니케이션즈 (종합PR)</option><option>노바디지털 (퍼포먼스)</option><option>써치온 (SEO·GEO)</option><option>직접 선택 안 함</option></select></div>
      <div class="fr"><label>업무 유형 <span class="req">*</span></label><select><option>언론홍보</option><option>보도자료 작성·배포</option><option>콘텐츠 마케팅</option><option>SEO·AEO·GEO</option><option>브랜드 컨설팅</option></select></div>
    </div>
    <div class="g2">
      <div class="fr"><label>예산 범위</label><select><option>~ 300만원</option><option>300~500만원</option><option>500~1,000만원</option><option>1,000만원 이상</option><option>협의</option></select></div>
      <div class="fr"><label>희망 일정</label><select><option>2주 이내</option><option>1개월</option><option>2~3개월</option><option>장기</option></select></div>
    </div>
    <div class="fr"><label>문의 내용 <span class="req">*</span></label><textarea placeholder="회사·제품 소개, 목표, 요청 범위를 적어주세요."></textarea></div>
    <div class="g2">
      <div class="fr"><label>담당자명 <span class="req">*</span></label><input placeholder="이름"></div>
      <div class="fr"><label>연락처(이메일) <span class="req">*</span></label><input type="email" placeholder="name@company.com"></div>
    </div>
    <div class="actions"><a class="btn" href="index.html">취소</a><button type="submit" class="btn pri">문의 보내기</button></div>
  </form>
  <div style="height:50px"></div>
</div>
<div id="mag-footer"></div>
<script src="../assets/js/magazine-header.js?v=2"></script>
</body>
</html>
