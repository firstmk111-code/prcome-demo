<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>포트폴리오 — PRCOME 프로젝트·매칭</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../assets/css/magazine-system.css">
<script>window.MAG={root:'../',home:'../index.html',catBase:'../insights/index.html'};</script>
<style>
.subhead{padding:30px 0 6px}.subhead .crumb{font-size:12.5px;color:var(--sub);margin-bottom:12px}
.subhead h1{font-size:clamp(24px,3vw,32px);font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:12px}
.subhead h1 .tick{width:26px;height:3px;background:var(--pt);border-radius:2px}
.subhead .desc{font-size:15.5px;color:var(--sub);margin-top:10px;max-width:56ch;line-height:1.6}
.pf{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;padding:26px 0}
.pf a{display:block}
.pf .th{aspect-ratio:3/2;position:relative;overflow:hidden;background:var(--navy);border-radius:6px;margin-bottom:12px}
.pf .th .bar{position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--pt)}
.pf .th .k{position:absolute;left:14px;bottom:10px;font-size:22px;font-weight:800;color:rgba(255,255,255,.18)}
.pf .th .pt{position:absolute;left:14px;top:12px;font-size:11px;font-weight:800;color:#9DB4FF}
.pf .cat{font-size:11.5px;font-weight:700;color:var(--pt)}
.pf h3{font-size:16.5px;font-weight:700;margin:5px 0 4px;line-height:1.35}
.pf a:hover h3{color:var(--pt)}
.pf .by{font-size:12.5px;color:var(--sub)}
@media (max-width:900px){.pf{grid-template-columns:1fr 1fr}}
@media (max-width:560px){.pf{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="mag-header"></div>
<div class="wrap">
  <section class="subhead">
    <div class="crumb"><a href="../index.html">홈</a> / <a href="index.html">프로젝트·매칭</a> / 포트폴리오</div>
    <h1><span class="tick"></span>대행사·전문가 포트폴리오</h1>
    <p class="desc">완료된 홍보·마케팅 프로젝트 사례를 살펴보고, 우리에게 맞는 파트너를 찾아보세요.</p>
  </section>
  <div class="pf" id="pf"></div>
  <div style="height:50px"></div>
</div>
<div id="mag-footer"></div>
<script src="../assets/js/magazine-header.js"></script>
<script>
var P=[
 ['언론홍보','시리즈A 핀테크 투자유치 언론홍보','브릿지커뮤니케이션즈 · 경제지 12건','PR'],
 ['콘텐츠','뷰티 브랜드 오너드미디어 리뉴얼','스토리브릭스 · 뉴스룸 구축','CONTENT'],
 ['퍼포먼스','커머스 브랜드 그로스 캠페인','노바디지털 · ROAS 개선','GROWTH'],
 ['SEO·GEO','B2B 제조사 검색 가시성 개선','써치온 · AI 인용 확대','GEO'],
 ['위기관리','식품 기업 이슈 대응 커뮤니케이션','미디어웨이브 · 24시간 대응','CRISIS'],
 ['브랜딩','제조 중소기업 리브랜딩','플랜에이트 · 아이덴티티 구축','BRAND']
];
document.getElementById('pf').innerHTML=P.map(function(p){
 return '<a href="#" onclick="alert(\'준비 중인 상세 페이지입니다. (1차 정적 가안)\');return false;"><div class="th"><span class="bar"></span><span class="pt">'+p[0]+'</span><span class="k">'+p[3]+'</span></div><span class="cat">'+p[0]+'</span><h3>'+p[1]+'</h3><div class="by">'+p[2]+'</div></a>';
}).join('');
</script>
</body>
</html>
